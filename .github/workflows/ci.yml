name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Typecheck, Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck web
        run: npm run typecheck --workspace=apps/web

      - name: Typecheck api
        run: npm run typecheck --workspace=apps/api

      - name: Lint web
        run: npm run lint --workspace=apps/web

      - name: Lint api
        run: npm run lint --workspace=apps/api

      - name: Test api
        run: npm test --workspace=apps/api

      - name: Test web
        run: npm test --workspace=apps/web

  deploy:
    name: Migrate & Deploy
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate:deploy --workspace=apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/tavern-log/tavern-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/tavern-log/tavern-api:latest
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: IMAGE
          script: |
            docker pull $IMAGE
            docker stop tavern-api || true
            docker rm tavern-api || true
            docker run -d \
              --name tavern-api \
              --restart unless-stopped \
              --env-file /home/gcp-tavern-log/tavern-api.env \
              -p 3001:3001 \
              $IMAGE
            docker image prune -f

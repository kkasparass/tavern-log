name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Typecheck, Lint, Prisma Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck web
        run: npm run typecheck --workspace=apps/web

      - name: Typecheck api
        run: npm run typecheck --workspace=apps/api

      - name: Lint web
        run: npm run lint --workspace=apps/web

      - name: Lint api
        run: npm run lint --workspace=apps/api

      - name: Prisma validate
        run: npm exec --workspace=apps/api -- prisma validate
